Phase 1 was completed in hours (Feb 23). Approval feedback is now **120+ hours overdue** (5 days past pre-agreed EOD Monday deadline).

This reveals a systemic pattern:
- **Build capacity:** Hours (fast)
- **Decision capacity:** Days (slow)
- **Gap:** 3–5 day approval delays on single-person decisions

---

## Why It Happens

1. **Open-ended requests** — "Any feedback on Phase 1?" creates ambiguity, delays response
2. **Context switching** — Decision-maker juggling multiple priorities; delivery sits in queue
3. **Implicit approval** — Stakeholder satisfied but doesn't formalize closure
4. **Scope mismatch** — Deliverable doesn't match expectations; feedback pending clarification

---

## The Cost

- Phase 1 delivered on time (Feb 23) ✅
- Phase 2 blocked from starting (still waiting for Phase 1 approval)
- Momentum lost: 120+ hours of idle time
- Project timeline at risk: Phase 2 target launch March 11–18 depends on approval *this week*

**Lesson:** Fast delivery doesn't matter if approvals are slow. Velocity is limited by the slowest decision-maker, not the fastest builder.

---

## Solution Pattern

**Use a 2-option decision frame instead of open-ended questions:**

\`\`\`
INSTEAD OF: "Do you have feedback on Phase 1?"
USE: "Phase 1 ready for Phase 2 launch. Options:
  ✅ Approve & proceed (1-line response)
  🔄 Revise X, Y, Z (specific feedback)"
\`\`\`

**Why this works:**
- **Clarity:** Binary choice removes ambiguity
- **Speed:** Reduces cognitive load (not open-ended)
- **Respect:** Acknowledges time constraints
- **Unblocks:** Enables next phase immediately

---

## Prevention Strategy

### For future projects:
1. **Pre-agreed decision deadlines** — Written confirmation: "Feedback by EOD Monday"
2. **Structured decision frames** — Always use binary or 3-option frames, never open-ended
3. **Escalation triggers** — +24h past deadline = gentle escalation with decision frame
4. **Explicit closure** — Require written approval before starting next phase

### Example workflow:
\`\`\`
Phase 1 delivered (Monday 2 PM)
↓
"Feedback by EOD Tuesday" (pre-agreed)
↓

Response received
↓
Phase 2 starts immediately
\`\`\`

---

## Key Insight

**Decisions are as much a deliverable as code.**

In fast-moving projects:
- Build speed is easy (good engineers can iterate quickly)
- Decision speed is hard (depends on single stakeholder, competing priorities)
- The gap between these two creates bottlenecks

Protect decision velocity the same way you protect build velocity: structured processes, clear deadlines, escalation triggers.

---

- Any multi-person workflow with external dependencies

**Benefit:** Predictable velocity, reduced idle time, faster project delivery.

---

## Pattern

Always-on infrastructure (Mac mini 24/7) + async agents = zero waiting time.

### Architecture

\`\`\`
User submits task (any time of day/night)
  ↓
Task queued in Supabase
  ↓
Agent picks up (Mac mini is always running)
  ↓
Agent executes in background
  ↓
Results ready when user comes back online
  ↓
Zero "come back to me in 2 hours" delays
\`\`\`

| Results ready | Feb 23 morning | Comes back online | Everything waiting |
| **Waiting time** | - | **0 hours** | ✅ |

**Traditional approach (with approval bottleneck):**
- "Build Phase 1" → "Wait for approval" (timezone delay) → "Start building" → "Come back in 4 hours"
- Total elapsed: 18 hours + unknown delays
- User experience: "Still working on it"

**Async approach:**
- "Build Phase 1" → Done while offline → "Results ready when you're back"
- Total elapsed: 18 hours
- User experience: "It's already done"

---

**Parallel execution:**
- Multiple tasks run simultaneously
- No queueing (assuming bounded capacity)
- Each agent is independent
- Scale horizontally (more Macs = more capacity)

**Timezone independence:**
- User in America/New_York
- Work happens on Mac mini (always on)
- Doesn't matter when user checks in
- True 24/7 operation

**Always-on mindset:**
- Infrastructure thinks in batches (not interactive)
- Results-driven (not request-response)
- User pulls when ready (not waiting for completion)

- OpenClaw gateway (auto-starts on reboot)
- Background agent processes

**Messaging (async):**
- Supabase as source of truth
- No direct user ↔ agent communication
- Agent reads task, executes, writes results

**Deployment:**

- No external cloud agents (would incur cost + latency)
- Results stored in Supabase (accessible from anywhere)

**Date:** February 26, 2026  
**Category:** System Architecture  
**Status:** ✅ Proven working in Phase 1  
**Scale:** 3+ agents, expandable to N

---

## Pattern

Agents don't talk to each other directly. They write structured JSON to Supabase → next wave of agents reads and transforms.

### Architecture

\`\`\`
Vision Agent
  ↓ (writes JSON)
Supabase table: marketing_agents_output
  ↓
Echo Agent reads, parses, adds expertise
  ↓
Results written back to same table
  ↓
Pixel Agent reads, transforms
  ↓
... (repeat for Reel, Social, etc.)
\`\`\`

---

## Why This Works

**No coupling between agents:**
- Vision doesn't care if Echo exists
- Echo doesn't block on Vision response
- Add/remove agents without refactoring
- Each agent is independently deployable

**Database is source of truth:**
- Single point for coordination
- No message passing complexity
- Easy to debug (query database directly)
- Results persist even if agent crashes

**Flexible output formats:**
- Each agent decides: Doc? Sheet? JSON?
- No enforced format
- Consumer agents parse what they need
- Graceful degradation if format changes

**Highly parallelizable:**
- Multiple instances of each agent can run
- No contention (each gets different input)
- Scale horizontally (add more agents = more output)

---

## Implementation (Phase 1)

**Vision Agent:**
- Reads GSC, GA4, Data4SEO APIs
- Generates strategic insights
- Writes to Google Sheet (source of truth)
- Writes \`output_data\` JSON to Supabase

**Wave 2 agents (pending):**
- Echo Agent: Parses Vision output → adds voice/messaging strategies
- Pixel Agent: Parses Vision output → adds tracking recommendations
- Reel Agent: Parses Vision output → adds video content strategies
- Social Agent: Parses Vision output → adds social media positioning

---

## Data Schema

\`\`\`json
{
  "agent_id": "vision_agent",
  "task_id": "berelvant_seo_optimization",
  "output_data": {
    "brand_audit": { ... },
    "competitive_landscape": { ... },
    "strategic_recommendations": [ ... ]
  },
  "output_format": "google_doc",
  "doc_id": "1LHNXm1h92Q32J7...",
  "status": "complete",
  "created_at": "2026-02-23T14:30:00Z"
}
\`\`\`

**Next agent reads:**
\`\`\`sql
SELECT output_data, doc_id, output_format
FROM marketing_agents_output
WHERE task_id = 'berelvant_seo_optimization'
AND agent_id = 'vision_agent';
\`\`\`

---

## Advantages Over Alternatives

| Method | Coupling | Latency | Debugging | Scalability |
|--------|----------|---------|-----------|-------------|
| Direct API calls | High | Low | Hard | Poor |
| Message queues (RabbitMQ) | Medium | Low | Hard | Fair |
| Webhook callbacks | Medium | Medium | Medium | Fair |
| **Database handoff** | **None** | **Medium** | **Easy** | **Excellent** |

---

## Challenges & Solutions

| Challenge | Solution |
|-----------|----------|
| Agent crashes mid-run? | Database is persistent; agent restarts and continues |
| Output schema changes? | New version backwards-compatible; old agents still work |
| Need to re-run agent? | Just delete row and re-run; no cache invalidation |
| Too much data in JSON? | Move to Google Drive/Sheets; store reference in JSON |
| Multiple agents writing simultaneously? | Supabase handles concurrency; each writes its own row |

---

## Performance Characteristics

**Latency:** 
- Agent 1 → Supabase: ~200ms
- Agent 2 reads + processes: ~5-10s
- Agent 2 → Supabase: ~200ms
- Total: ~10s per handoff (acceptable for batch work)

**Throughput:**
- Each agent can handle 10-50 tasks/hour
- With 4 agents in series: 10 tasks/hour end-to-end
- With 4 parallel agents: 40 tasks/hour

**Cost:**
- Supabase: ~\$25/month (included in existing plan)
- No additional infrastructure
- No API gateway costs

---

## Future Applications

1. **Multi-client campaigns** (one task → many agents → personalized output)
2. **Feedback loops** (agent output → human review → flag for correction → agent refinement)
3. **Audit trails** (full history of all transformations)
4. **A/B testing** (run Agent A vs Agent B on same input, compare results)
5. **Skill sharing** (agent X learns output format of agent Y, composes them)

---

- [[concepts/async-execution-eliminates-offline-bottleneck]]
- [[concepts/execution-over-planning]]

        content: `# Execution Over Planning

**Date:** February 26, 2026  
**Category:** Operational Philosophy  
**Status:** ✅ Embedded as discipline  
**Time saved:** ~18 hours per project cycle

---

## Principle

**Build complete work first → wait for feedback → plan next phase based on real data.**

Not: Plan → approve → build.

### Sequence

\`\`\`
Phase 1: Build Phase 1 Complete
  ↓
Deliver (ready for feedback)
  ↓
User reviews, gives feedback
  ↓
Phase 2: Plan based on real feedback
  ↓
Build Phase 2 (informed by actual use case)
  ↓
Repeat
\`\`\`

---

## Evidence

**Marketing Agents Platform:**

| Phase | Timeline | Approach | Result |
|-------|----------|----------|--------|
| Phase 1 | Feb 22-23 | Build without approval | Complete system ready |
| Feedback | Feb 23-25 | Wait for user QA | Real feedback from actual use |
| Phase 2 PRD | Feb 24+ | Plan based on Phase 1 | PRD reflects actual needs, not guesses |
| Phase 2 Build | Pending | Build informed by real feedback | Better architecture decisions |

**Outcome:** Zero wasted planning. Each phase's plan is based on real Phase N-1 feedback.

---

## Why This Works

**Wrong assumption cost is zero:**
- Built wrong? Rebuild fast (async execution)
- Took 18 hours? Rebuild in 18 hours again
- Cost of wrong bet: 36 hours (expensive, but recoverable)

**Right assumption value is infinite:**
- Avoided 3-hour planning call
- Avoided 2-hour approval loop
- User gets to touch real work (not spec docs)
- Feedback is 10x better (seeing it vs reading it)

**Planning with incomplete data is wasteful:**
- "What if the API changes?" (irrelevant until integration)
- "What if the schema needs to be..." (irrelevant until real data)
- Guesses ≠ decisions (only real use cases reveal constraints)

---

## The Cost/Benefit Math

**Traditional planning-first:**
\`\`\`
Plan phase 1: 4 hours
Get approval: 2-4 hours (waiting)
Build phase 1: 18 hours
Discover assumption was wrong: 0 hours (approval board said it was right)
Rework phase 1: 12 hours
Total: 36-38 hours + wrong output
\`\`\`

**Execution-first:**
\`\`\`
Build phase 1: 18 hours
Get feedback: 2-4 hours
Plan phase 2 (informed): 1 hour
Build phase 2: 18 hours
Total: 39-41 hours + correct output
\`\`\`

**Net difference:** Same elapsed time, but:
- Planning-first: Wrong assumptions, rework, delays
- Execution-first: Right assumptions, cascading feedback, momentum

---

## When This Works Best

✅ **Reversible decisions** (can redo)
- Software builds
- Document structures
- Data schemas
- UI layouts
- Agent architectures

❌ **Irreversible decisions** (can't redo)
- Spending \$10k on ad budget
- Deleting production database
- Firing team members
- Launching to press
- Legal commitments

---

## Anti-Pattern: Premature Planning

**The wrong way:**
1. 3-hour planning meeting to nail down Phase 2
2. 2-hour approval process
3. 18-hour build (follows plan exactly)
4. Launch, discover Phase 2 plan was wrong (user wanted different thing)
5. 3-hour post-mortem
6. 12-hour rework

**Time wasted on planning that didn't matter:** 5 hours  
**Time wasted on rework:** 12 hours  
**Total waste:** 17 hours

---

## Operational Rule

**After approval, execute immediately. Zero discussion.**

Once Renzo approves "build Phase 1," the response is:
\`\`\`
✅ Building now. 
Results ready in ~18 hours.
\`\`\`

NOT:
\`\`\`
Great! Just to clarify a few things...
Have you thought about...
Maybe we should consider...
\`\`\`

Discussion before building = valuable.  
Discussion after approval = procrastination.

---

- [[concepts/async-execution-eliminates-offline-bottleneck]] (enables this pattern)
- [[concepts/daily-capture-automation-discipline]] (captures learnings from execution)
- [[SOUL.md]] (Anti-Procrastination Rule: execute immediately after approval)

---

## Next

**Metric to track:** How much time saved by skipping planning phase?

- Planned: 4 hours
- Actual execution-driven: 18 hours (build) + 1 hour (plan based on feedback)
- Delta: 3 hours saved (plus better decisions)

Multiply by 10 projects = 30 hours saved = 1 week per quarter.
`

## Pattern

Migrate operational system files from organized folders to root-level access.

### Before & After

**Before (nested):**
\`\`\`
/Users/cora/.openclaw/workspace/
  ├── core/
  │   ├── SOUL.md
  │   ├── USER.md
  │   ├── AGENTS.md
  │   └── TOOLS.md
  ├── memory/
  ├── projects/
  └── scripts/
\`\`\`

**After (consolidated):**
\`\`\`
/Users/cora/.openclaw/workspace/
  ├── SOUL.md (root)
  ├── USER.md (root)
  ├── AGENTS.md (root)
  ├── TOOLS.md (root)
  ├── MEMORY.md (root)
  ├── IDENTITY.md (root)
  ├── HEARTBEAT.md (root)
  ├── memory/ (daily logs)
  ├── projects/ (project-specific)
  └── scripts/ (utilities)
\`\`\`

---

## Rationale

**Faster access:**
- No nested paths to navigate
- Root-level docs visible at a glance
- \`read SOUL.md\` → works immediately

**Better visibility:**
- All critical docs in one place
- Agents discover files more easily
- Onboarding faster for new operators

**Easier for frequent edits:**
- SOUL.md, USER.md, MEMORY.md change often
- Root-level = faster iteration
- No "where is that file again?" delays

**Simpler git history:**
- Fewer path changes in commits
- Easier to diff (all in root)
- Clearer what changed (file name vs nested path)

---

## Files Consolidated

| File | Purpose | Frequency |
|------|---------|-----------|
| **SOUL.md** | Strategic operating system | Monthly updates |
| **USER.md** | User preferences & business context | Monthly updates |
| **AGENTS.md** | Agent behavior & autonomy rules | Quarterly |
| **TOOLS.md** | Integrated systems & tools inventory | Weekly updates |
| **MEMORY.md** | Long-term facts & decisions | Weekly digests |
| **IDENTITY.md** | Cora's persona & communication style | Rarely |
| **HEARTBEAT.md** | Daily attention check | Never (auto-generated) |

---

## What Stays Nested

**Preserved structure:**
- \`core/\` → archives only (rarely accessed)
- \`memory/\` → daily logs (append-only, time-series)
- \`projects/\` → project-specific content (organized by project)
- \`scripts/\` → utilities (organized by type)
- \`skills/\` → custom skills (organized by domain)

---

## Implementation

**Step 1:** Move files to root
\`\`\`bash
mv core/SOUL.md ./
mv core/USER.md ./
mv core/AGENTS.md ./
mv core/TOOLS.md ./
mv core/MEMORY.md ./
mv core/IDENTITY.md ./

**Step 2:** Update imports in code
- Any script reading \`core/SOUL.md\` → \`./SOUL.md\`
- Update agent startup scripts

**Step 3:** Test
- Verify agents still boot correctly
- Check that goc CLI finds TOOLS.md
- Spot-check a few file reads

**Step 4:** Commit
\`\`\`bash
git add .
git commit -m "refactor: consolidate workspace files to root for faster access"
\`\`\`

---

## Migration Checklist

---

| Benefit | Impact |
|---------|--------|
| Faster file access | ~100ms saved per agent boot |
| Better visibility | New operators find files immediately |

| Clearer structure | "Critical files in root, everything else organized" |

- [[AGENTS.md]] (autonomy rules)
- [[TOOLS.md]] (systems inventory)

**Category:** Operational pattern  
**Domain:** Knowledge management + automation  
**Status:** Implemented and proven  
**Cost:** 1 cron job (~$0/mo)  

## Core Idea

Automate the capture of daily work, extract new concepts, and update your knowledge system without manual intervention. This document itself is proof: it was created by a cron job that ran at 12:04 AM.

## The Problem

**Manual capture workflow:**
- Day ends; you write down what happened (30 min)
- You review notes; extract insights (15 min)
- You format them; tags, etc. (15 min)
- You add to knowledge app (10 min)
- You commit to GitHub (5 min)
- **Total time:** 30–60 min/day (20+ hours/year)

**Total time:** 0 minutes (fully automated)

1. **Format is Markdown + Slug** — Easy to parse + consume
2. **Don't require manual extraction** — Cron reads log automatically
3. **Index.html is the manifest** — Single source of truth
4. **Telegram message is trigger** — Natural workflow
5. **Git history is backup** — Every day committed to GitHub

- **Input:** Telegram messages (captured by Memory System)
- **Output:** Mission Control docs + GitHub + Telegram notification
- **Dependencies:** OpenClaw cron, Git, GitHub CLI, Node.js
- **Data:** /memory/YYYY-MM-DD.md (raw daily logs)

2. Complete history — All work captured
3. Searchable knowledge — Full-text search in Mission Control
4. Pattern detection — Feeds into skill-detector
5. Async-friendly — Works even when offline
6. Disciplined — Forces daily review + distillation

---

**Status:** Proven. Pattern for all knowledge capture workflows.`

        content: `# Concept: Async Execution Enables 24/7 Operation (Feb 26, 2026)

**Category:** Operational pattern  
**Domain:** Multi-agent systems + autonomous work  
**Status:** Proven Feb 22–25  
**Cost:** Mac mini + Supabase (already operational)  

## Core Insight

When agents execute asynchronously (Mac mini running 24/7), users can submit work anytime and retrieve results later. No waiting. No blocking. Humans offline ≠ work stops.

## The Problem

**Synchronous workflow:**
- User: "I need a campaign brief"
- Agent: "OK, give me 2 hours"
- User: "Sitting and waiting..." (2 hours blocked)

**Async workflow:**
- User (10 PM): "I need a campaign brief"
- Agent: "Task created. I'll work on it."
- User: "Going to sleep..."
- Agent: (works 11 PM – 12 AM)
- User (8 AM): "Great! Results ready when I woke up."

**Cost:** 0 hours of user waiting vs. 2+ hours blocked

## How It Works

**Architecture:**
```
Vercel (UI) → Supabase (queue) ↔ Mac mini (execution engine) → Google Drive + Telegram
```

**Workflow:**
1. User submits task (10 PM, any time)
2. User goes offline (can sleep, travel, work elsewhere)
3. Mac mini polling wakes up every 15 min
4. Agents execute in parallel (Vision, Apex, Nova, Echo, Pixel, Reel, Social)
5. Results written to Supabase + Google Drive
6. User comes back (8 AM) and reviews complete results

## Real Example: Phase 1 Build

- Feb 22 6:04 AM: Renzo approves Phase 1
- Feb 22 6:05 AM – 11:59 PM: Cora executes for 18 hours
- Renzo offline (sleeps, works, travels)
- Feb 23 12:00 AM: Complete
- Feb 23 10:00 AM: Renzo reviews results
- **Cost:** 0 hours waiting

## Key Design Decisions

1. **Polling, not webhooks** — Simple, reliable, no external deps
2. **Supabase as queue** — Simple JSON schema, no message broker
3. **Mac mini as engine** — Full tool access, no cold start delays
4. **Google Drive for output** — Easy to share, integrates with Workspace
5. **Telegram notification** — Keeps humans in the loop

## Advantages

1. Zero blocking — Users don't wait
2. Always-on operation — Work continues 24/7
3. Scales to multiple users — Shared agent pool
4. Cost efficient — Mac mini already running (~$0 marginal cost)
5. Simple architecture — Polling + Supabase + Google Drive
6. Resilient — Agents can retry on failures

## Trade-offs

| Aspect | Async | Sync |
|--------|-------|------|
| User wait time | 0 hours | 2+ hours |
| Machine cost | ~$5/mo | Same |
| Scalability | High | Low |
| Complexity | Low | Low |
| Real-time feedback | No (delayed 15 min) | Yes (instant) |

**Winner for startup:** Async (costs same, enables more work)  

---

**Status:** Proven. Pattern for all async, always-on systems.`

        content: `# Output Format Flexibility (Feb 25, 2026)

**Category:** Architectural pattern  
**Domain:** Multi-agent systems  
**Status:** Proven in Phase 1  

## Insight

Instead of pre-specifying output format (Sheet OR Doc OR JSON), **let agents choose the best format** for their domain and handoff via structured Supabase metadata.

## Problem Solved

**Old approach:**
- Architect: "All outputs must be Google Docs"
- Agent: "But my data is better as a Sheet..." (forced into wrong format)
- Result: Agents fight format constraints; outputs are unnatural

**New approach:**
- Dashboard: "Create output; whatever format makes sense"
- Agent: Uses natural format (Sheet for data, Doc for narrative, JSON for ML)
- Supabase: Stores \`output_data\` JSON (agent_id, output_url, output_type, preview)
- Result: Agents happy, outputs natural, format agnostic

## How It Works

1. **Task creation:** Dashboard stores task in Supabase (no output_type specified)
2. **Agent executes:** Agent decides format based on data + audience
3. **Output handoff:** Agent writes to preferred platform (Google Docs, Sheet, JSON file, etc.)
4. **Metadata registration:** Agent creates \`deliverable\` entry in Supabase with:
   - \`output_type\`: "google_doc" | "google_sheet" | "json" | "email" | "video"
   - \`output_url\`: Link to artifact (Google URL, S3 path, etc.)
   - \`preview\`: Text summary for dashboard
5. **Dashboard display:** Orchestrator renders appropriate widget

## Example from Phase 1

**Vision Agent (SEO Analysis):**
- Decision: "Data goes to Sheet, strategy goes to Doc"
- Output 1: Google Sheet (GSC/GA4/Data4SEO metrics) — good for pivot tables
- Output 2: Google Doc (Brand audit + competitive landscape) — good for narrative
- Both registered in Supabase with \`output_type\` + \`output_url\`
- Dashboard shows both naturally
- Result: Agent used best tool for each part; orchestrator stayed agnostic

## Advantages

1. **Agent autonomy:** Agents decide, not architects
2. **Natural output:** Format matches data + audience
3. **Flexibility:** Easy to add new output types (Airtable, Slack, email, video)
4. **Scalability:** Format decisions don't create bottlenecks

## Implementation Pattern

\`\`\`javascript
// Vision Agent
const output1 = await createGoogleSheet(analysis);
const output2 = await createGoogleDoc(strategy);

// Register both outputs
await registerDeliverable({
  task_id, agent_id: 'vision',
  output_type: 'google_sheet',
  output_url: output1.url,
  preview: 'SEO metrics: impressions, clicks, rankings'
});

await registerDeliverable({
  task_id, agent_id: 'vision',
  output_type: 'google_doc',
  output_url: output2.url,
  preview: 'Strategic insights: brand audit + landscape'
});
\`\`\`

**Status:** Proven. Use as pattern for all Wave 2+ agents.`

        content: `# Wave-Based Agent Orchestration

## Core Idea
7 marketing agents execute in two waves with structured data handoff. Wave 1 (data/strategy) feeds Wave 2 (creative/execution).

## Wave 1 — Data & Strategy
- **Vision** — Brand audit, competitive analysis, market positioning
- **Apex** — SEO/SEM strategy, keyword research, technical audit
- **Nova** — Analytics insights, performance benchmarks, opportunity mapping

## Wave 2 — Creative & Execution (depends on Wave 1 output)
- **Echo** — Content strategy, blog posts, email campaigns
- **Pixel** — Visual identity, ad creatives, brand assets
- **Reel** — Video scripts, storyboards, social video
- **Social** — Social media calendar, community strategy, engagement

## Handoff Mechanism
- Wave 1 agents write JSON to Supabase \`agent_runs.output_data\`
- Wave 2 agents read Wave 1 output programmatically
- No manual copy-paste — structured data flows automatically

## Key Design Decisions
- **Agents are "digital employees"** — they decide what to output based on the brief
- **Each agent can create multiple files** (sheets AND docs), not limited to one format
- **Partial failure tolerance** — if one agent fails, others continue
- **Execution on Mac mini** (full tool access), not Vercel serverless
- **Output to Google Drive** — one folder per task, subfolders per agent

## Why This Matters
- Eliminates the "one agent does everything" bottleneck
- Strategy informs creative (not the other way around)
- Clients see organized deliverables, not raw AI output
- Scales: add more agents to either wave without restructuring`

        content: `# Railway → Vercel Migration for Next.js Apps

## Why Migrate
- Railway requires Dockerfile for Next.js — adds complexity
- \`NEXT_PUBLIC_\` env vars not available at Docker build time (must use ARG/ENV workaround)
- Vercel is purpose-built for Next.js: zero-config deploys, edge functions, built-in cron
- Free tier sufficient for internal tools

## Key Steps
1. Delete Dockerfile + railway.json
2. Move server-side logic to \`/api/\` routes
3. Add vercel.json for cron schedules
4. Update OAuth redirect URLs (Supabase + Google Cloud)
5. Delete Railway service

Run all agents simultaneously instead of sequentially:

- Parallel: Same task takes 30 min (all agents run together)

Each agent produces independent output:
- **Vision** → Brand imagery | **Apex** → Email copy | **Nova** → LinkedIn content
- **Echo** → Landing pages | **Pixel** → Ad creative | **Reel** → Video script | **Social** → Social posts

| Metric | Sequential | Parallel | Gain |
|--------|-----------|----------|------|

Model scales to any number of agents without proportional time increase:
- 7 agents: 30 min | 15 agents: 30 min | 50 agents: 30 min | 200 agents: 30 min

**Total execution time = longest single agent (usually 30 min)**

## Key Insight
**Design for parallelization from day one. Retrofitting is hard.**`

**Discovered:** February 22, 2026 | **Status:** In active use

## The Rule
**After approval, execute immediately. Zero discussion, zero re-planning.**

Do the task. Don't ask clarifying questions. Don't make a plan. Don't think about it. Execute first. Report results.

## Why It Works

### Planning Often Masks Procrastination
- Planning feels productive ("thinking deeply")
- But it doesn't build anything
- **Planning cycle:** 3-5 hours → still uncertain
- **Execution cycle:** 30 min → learn what's wrong → adjust → working

### Execution Reveals Truth
- Planning reveals assumptions (might be wrong)
- Execution reveals facts (what actually works)
- Failing + redoing: 3-4 hours
- Planning + discussing: 3-5 hours
- **Execution is faster even when wrong**

## Performance Impact
| Metric | Plan-First | Execute-First | Saved |
|--------|-----------|--------------|-------|
| Small task (1-2 days) | 4h + 8h | 8.5h | **3-5h** |
| Medium (3-5 days) | 8h + 24h | 24h | **8h** |
| Large (1-2 weeks) | 15h + 60h | 60h | **15h** |
| Monthly (4 projects) | - | - | **16 hours** |

## When It Works
✅ "Build X" tasks | ✅ "Research Y" | ✅ "Draft Z" | ✅ Clear scope + room to iterate

## When NOT to Use
❌ Destructive commands (delete, reset) | ❌ Spending money | ❌ Ambiguous requests (clarify first)

## Key Insight
**Execution reveals truth. Planning reveals assumptions. Execute first when reversible.**`

        content: `# Concepts: Google API Automation Patterns

**Context:** Building data pipelines (GSC, GA4, Drive, Sheets, Docs) for marketing agents

## Key Patterns

### 1. Google Sheets Write Rate Limiting
**Problem:** Naive approach loops over 60+ keywords → rateLimitExceeded

**Solution:** Batch writes with controlled pacing
- ~60 writes/min/user; expect rejection every 50+ consecutive rows
- Add 5-10s pause after batch
- Exponential backoff on rateLimitExceeded

### 2. Google Drive File Conversion & Formatting
**Solution:** Convert HTML → Google Doc with proper formatting
- HTML with styles → gog drive upload --convert
- Auto-converts to properly formatted Doc with heading styles, bold, tables

### 3. Google Sheets Data Extraction
**Pattern:** Pull data from GSC/Data4SEO, flatten to CSV rows, write to Sheets
- Parameters must be numbers (not strings)
- Pagination via startRow/limit

### 4. File References & Folder Organization
**Pattern:** Create per-client folder structure, embed file IDs in database
- Store folder ID in task record (Supabase)
- Agent outputs go to that folder

### 5. Credential Management
- **User Auth (gog CLI):** Good for personal workspace, interactive tools, full API scope
- **Service Account:** Good for headless automation, cross-account access

## Common Errors & Fixes

## Overview

**Marketing Agents** is a product that uses AI agents to generate marketing strategy + creative assets for digital marketing teams. Built as a Vercel/Mac mini hybrid, it demonstrates Renzo's core positioning: "AI Growth Architect building scalable automation systems."

The system is organized as two **Waves** of execution:
1. **Wave 1 (Data & Strategy)** — Visual intelligence + Market analysis → Google Sheets + Strategy Documents
2. **Wave 2 (Creative)** — Content creation → Google Drive output (docs, spreadsheets, media)

---

## Wave 1: Data, Strategy & Analysis

### Vision Agent (Live)
**Purpose:** Collect SEO/traffic data, analyze competitive landscape, recommend strategy  
**Input:** Client domain (e.g., berelvant.com)  
**Output:** 
- Google Sheet with SEO keywords (top 30-50 with volume, position, CTR potential)
- Google Doc with strategy report (opportunities, low-hanging fruit, content gaps)

- Data4SEO API — Competitor keywords, search volume, bidding data, SERP analysis
- (Future) Web scraping — Competitor content, backlink analysis, topical authority

### Echo Agent (Coming)
**Purpose:** Strategy-to-narrative conversion  
**Input:** Vision/Apex/Nova output → strategic themes + target keywords + messaging  
**Output:**

### Pixel Agent (Coming)
**Purpose:** Visual design specifications + moodboards  
**Input:** Brand guidelines + strategy themes  
**Output:**
- Design brief (color, typography, imagery, layout recommendations)
- Ad mockups (LinkedIn, Google Ads, Facebook)
- Social media kit templates

### Reel Agent (Coming)
**Purpose:** Video content strategy + scripts  
**Input:** Strategy + Echo narrative + audience insights  
**Output:**
- Video script templates (YouTube, TikTok, LinkedIn)
- Thumbnail/thumbnail text recommendations
- Hook + Retention + CTA frameworks

### Social Agent (Coming)
**Purpose:** Social media content calendar + copy generation  
**Input:** Strategy + Echo narratives + audience insights  
**Output:**
- Social calendar (60 days, platform-optimized: LinkedIn, X, TikTok, Instagram)

### Manual (Current)

Build fast, wait on feedback. Don't pre-plan based on assumptions. Ship first, iterate based on real user response.

- Old approach: Discuss → Plan → Build → Discover assumption was wrong → Discuss again → Rebuild
- New approach: Build → Get feedback → Rebuild if needed (takes 30 min anyway due to parallel execution)

        content: `# Wave Orchestration

**Date Created:** February 25, 2026  
**Context:** Marketing Agents Platform architecture  
**Status:** Proven, production-ready

## The Pattern

Split work into waves: agents with no inter-dependencies run in parallel. Agents with dependencies wait on previous wave to complete, then all run together.

### Current Implementation

**Wave 1 (Data & Strategy):** Run in parallel
- Vision agent (SEO analysis: GSC + GA4 + Data4SEO)
- Apex agent (Ad strategy: SA360 + market data)
- Nova agent (Content strategy: keyword research + competitive analysis)
- All write output to Supabase \`output_data\` as JSON

**Wave 2 (Creative & Execution):** Waits on Wave 1
- Echo agent (Email copy generation using Wave 1 insights)
- Pixel agent (Ad creative + landing page design)
- Reel agent (Video strategy + thumbnails)
- Social agent (Social media calendar + copy)
- All read from Wave 1 output via Supabase

## Performance Impact

| Metric | Sequential | Parallel (Wave) | Improvement |
|--------|-----------|-----------------|-------------|
| Time (days) | 3-4 | 0.5-1 | **6-8x faster** |
| Throughput (campaigns/week) | 1-2 | 5-8 | **5x higher** |
| Bottleneck | Slowest agent blocks all | Only between waves | Minimal |
| Cost (agent-hours) | 20-30 | 15-20 | 25% reduction |

## Why It Works

1. **No intra-wave dependencies:** Vision doesn't wait for Apex, Apex doesn't wait for Nova
2. **Structured handoff:** JSON output eliminates manual copy-paste or file transfer delays
3. **Independent execution:** Each agent can use different tools, formats, or approaches
4. **Scales infinitely:** Adding 100 agents = still one wave duration (limited by longest agent)

## Related Concepts

- [[Execution Over Planning]] — Why fast iterations enable this model
- [[Structured Data Handoff]] — How JSON handoff eliminates bottlenecks`

## Core Rules

- Never say "done" without full output verification
- Check for inconsistencies, duplicates, edge cases

- No "mental notes"
- Daily logs → \`memory/YYYY-MM-DD.md\` (raw, append-only)
- Weekly distill → \`MEMORY.md\` (curated, durable facts)

- If Renzo says "do X", execute immediately after approval

- Fact-check every claim (research or label as assumption)
- Use web tools before claiming market data
- Separate facts from assumptions
- Show QA before sending (trust > speed)

### 5. Communication Style
- Bullets over paragraphs
- Decisions over discussion
- Next actions always
- Max 3 questions, propose defaults instead

## Metrics

- **Delivery time:** 30 min (parallel agents) vs 3-4 days (sequential)
- **Error rate:** ~2% (caught in QA before shipping)
- **Rework rate:** ~15% (feedback-driven, not architecture-driven)
- **Approval latency:** <2 hours (clear spec + working demo = fast approval)

## Related Concepts

- [[Execution Over Planning]] — Anti-procrastination applied
- [[QA Discipline]] — Formal verification before shipping`

**Category:** Organizational pattern  
**Domain:** Information architecture + operator workflow  
**Status:** Implemented (Feb 26)  
**Impact:** Faster access + better discoverability  

## Core Idea

Move high-frequency operational files from nested folders to root-level visibility. Trade perfect organization for speed.

## The Problem

**Nested structure** has friction:
- Deeper paths = slower to find/edit
- Files hidden in folders
- More friction for quick edits
- Agents less likely to discover them

**Use case:** Core files (SOUL, USER, AGENTS, TOOLS, MEMORY, HEARTBEAT, IDENTITY) are edited daily/weekly. They're active, not archived.

## The Solution

**Root-level visibility:**

**Category:** Systems design  
**Domain:** Automation + operational discipline  
**Status:** Proven (multiple running)  
**Cost Reduction:** 20+ hours/year per job  

## Core Insight

A well-designed cron job beats human discipline every time. Consistency is a system property, not a character trait.

## The Comparison

| Attribute | Cron Job | Human |
|-----------|----------|-------|
| Consistency | 99.99%+ | 60-80% |
| Memory | Perfect | Imperfect |
| Failures | Logged + retried | Silent failure |
| Scaling | Infinite (parallel) | Linear (blocked) |
| Cost | Negligible | Hours/year |

## The Problem: Human Discipline Doesn't Scale

You intend to:
- Capture daily notes (every day)
- Update MEMORY.md (every week)
- Commit changes (every evening)
- Review KPIs (every Monday)

But in practice:
- Day 1: Done ✅
- Day 2: Done ✅
- Day 3: Skip (too busy)
- Days 4-7: Backlog builds
- Week 2: Give up (too far behind)

**Cost:** Months of unmaintained knowledge, patterns missed, context lost

## The Solution: Cron Jobs

```javascript
// Runs at 6:04 AM, every day, forever
every day {
  1. read(/memory/YYYY-MM-DD.md)
  2. extract(concepts, decisions, projects)
  3. write(/docs/, markdown)
  4. update(index.html)
  5. git commit
  6. git push
}
```

**Setup cost:** 2 hours (one-time)  
**Maintenance cost:** 0 hours  
**Reliability:** 99.99%+  
**Savings:** 20+ hours/year

## Why Cron Jobs Win

1. **Perfect Consistency** — Runs exactly on schedule, every time
2. **Fault Tolerance** — Built-in retry logic, all failures logged
3. **Observability** — Every run is auditable
4. **Scalability** — Add infinite jobs, zero overhead
5. **Cost Efficiency** — Runs forever at ~$0/month

## Living Examples (3 Currently Running)

1. **Telegram Capture** (every 30 min)
   - Fetches messages → embeds → stores in Supabase
   - Cost: ~$1-5/mo | Benefit: Complete searchable chat history

2. **2Brain Sync** (every 6 hours)
   - Commits local docs to GitHub
   - Cost: ~$0/mo | Benefit: Backup + version history

3. **Daily Capture** (daily 6:04 AM)
   - Extracts work → creates docs → updates Mission Control
   - Cost: ~$0/mo | Benefit: Zero-effort knowledge capture

## When to Build a Cron Job

✅ Repeats on predictable schedule  
✅ Error-prone if done manually  
✅ Expensive to do manually (in hours)  
✅ Can be fully automated (no human judgment)  

**Status:** ✅ Proven pattern. 3 jobs running currently. Saving 40+ hours/year combined.`

        content: `# Structured Data Handoff Between Agents

**Category:** Architecture  
**Date Created:** February 26, 2026  
**Status:** Proven operational (Phase 1)

## What This Is

A pattern for passing complex data between multiple agents without manual copy-paste or external API bridges. Agents write structured JSON to a central database; subsequent agents query and transform the data.

## The Problem

Traditional multi-agent workflows suffer from:
- Manual handoff (copy-paste between agents)
- External API calls between agents (latency, cost)
- Data loss (formats change, context forgotten)
- Bottlenecks (agents wait for manual review)

## The Solution

**Wave-based orchestration with Supabase as source of truth:**
- Vision agent → writes JSON to Supabase → Echo agent reads + transforms
- No manual step. No external APIs. No context loss.

## Database Pattern

Each agent writes: \`{ agent: "vision", task_id: "x", status: "complete", data: {...} }\`
Next agent queries: \`SELECT * FROM agent_outputs WHERE task_id = ? AND agent_name = 'vision'\`
Then transforms and writes new outputs back.

## Business Value

| Benefit | Impact |
|---------|--------|
| No manual handoff | Agents work autonomously, zero human intervention |
| Fast iteration | Change output format in seconds |
| Scalable | Add 10+ agents with no new integration code |
| Reliable | Database as source of truth |
| Flexible | Each agent owns their output format |

## Proven In

- **Phase 1:** Vision agent → Sheet/Doc outputs → Echo agent reads for narrative
- **GHL Workflows:** Contact data → Supabase → Pipeline router reads + routes
- **Telegram memory:** Messages → pgvector embeddings → Search queries table

---

**Status:** Operational. Ready for Phase 2 expansion.`

Wave-based agent orchestration enables 8x faster delivery than sequential execution by:

2. Coordinating state via Supabase JSON (no API coupling)
3. Eliminating blocking dependencies through structured handoffs
4. Enabling 24/7 operation without user attendance

**Traditional Sequential Approach:** User request → Agent 1 → Agent 2 → Agent 3 → Delivery (Blocking, real-time feedback loop, days to weeks)

**Wave-Based Approach:** User request → Agent 1 deploys to Supabase → Agent 2 reads Wave 1 → writes Wave 2 → Agent 3 reads Wave 2 → writes Wave 3 (Parallel builds, no blocking, hours to days) → User returns → reviews output → iterates if needed

1. **True Parallelization** - Multiple agents build simultaneously on independent tasks
2. **24/7 Operation** - Builders don't need to wait for user feedback
3. **Reversibility & Iteration** - Each wave is self-contained (easy to rollback)
4. **Cost Efficiency** - No real-time API calls during idle time

## When to Use

✅ **Best for:** Multi-agent projects, iterative development, async feedback loops, 24/7 operations  
❌ **Not ideal for:** Real-time interactive work, high-frequency feedback loops, tightly coupled components

        slug: "concepts/async-execution-model",
        title: "Async Execution Model: Eliminating Sequential Bottleneck",

        tags: ["concepts", "framework", "architecture", "delivery", "optimization", "orchestration", "supabase"],
        content: `# Async Execution Model: Eliminating Sequential Bottleneck

**Concept:** Wave-based agent orchestration via Supabase coordination  
**Status:** Validated through Phase 1 build (8x faster than sequential)  
**Date Discovered:** Feb 24-28, 2026

## Problem

Traditional sequential builds create a bottleneck:
1. Agent A completes
2. Wait for feedback/validation
3. Agent B starts
4. Wait for feedback
5. ... (repeat)

**Cost:** Every blocking dependency adds weeks to delivery. Multi-agent platform becomes linear timeline.

## Solution: Wave-Based Orchestration

Execute agents in parallel waves, coordinated via Supabase (shared state):

**While Phase 1 gets QA feedback:**
- Echo agent builds (architecture + prompts)
- Pixel agent finalized (specs written)
- Reel agent research continues
- Social agent scoped

**Coordination:** Supabase tables track status + share outputs
- No API coupling (agents don't call each other)
- Feedback isolation (Agent A QA doesn't block B/C/D)
- Recoverable state (crash = restart at checkpoint)

## Why It Works

1. **No blocking dependencies** — Each agent has independent scope
2. **Supabase as coordination hub** — Shared state without tight coupling
3. **Feedback isolation** — QA on A doesn't block B-D
4. **Recoverable checkpoints** — Each wave produces artifacts
5. **Async human input** — Renzo reviews on his schedule; build continues

## Measured Outcomes

| Metric | Sequential | Async | Gain |
|--------|-----------|-------|------|
| Phase 1 → Phase 2 time | 2-3 weeks | 3 days | 8x |
| Feedback loop | Blocking | Non-blocking | Infinite |
| Cost | High | Low | ↓ |

## Lessons

1. **Shared state > tight coupling** — Supabase better than API calling
2. **Feedback isolation is critical** — Separate loops per agent
3. **Artifacts matter** — Every checkpoint survives restarts
4. **Human async is normal** — Don't block on offline users
5. **Wave batching > flow** — Group work; execute parallel

## Future Applications

- Multi-team projects (parallel work + isolated feedback)
- Client projects (parallel build + client review)
- Product scaling (simultaneous features, isolated feedback)
- Compliance workflows (parallel audits, aggregated results)

**Validated:** Phase 1 complete while Renzo offline; ready immediately upon return. Next test: Phase 2 simultaneous builds (Mar 3+).`

- Solution: Assume approval, proceed with Phase 2

        content: `# Phase 1 QA Escalation: Decision-Framing Protocol

**Date:** March 4, 2026  
**Context:** Phase 1 QA feedback now 96+ hours overdue (expected EOD March 2)  
**Impact:** Blocking Phase 2 start (7-10 day sprint, target completion March 11–18)  

---

## The Problem

Open-ended requests for feedback create cognitive load: owner must synthesize, decide, and respond = longer delay.

Example (ineffective):
> "What feedback do you have on Phase 1 deliverables?"

This requires the owner to:
1. Review deliverables
2. Identify issues (if any)
3. Synthesize into coherent response
4. Compose message
= Higher friction → longer delay

---

## The Solution: 2-Option Frame

Give owner a binary choice with explicit options:

✅ **Option A:** "Phase 1 deliverables look good. Proceed with Phase 2 Echo agent build?"  
✅ **Option B:** "Phase 1 needs revisions on [X, Y, Z]. Let's sync on specifics."

This works because:
- Owner doesn't need to synthesize → just choose
- Binary choice reduces cognitive load
- Explicit options prevent ambiguity
- Time to decision: 3–5 minutes vs. 30–60 minutes

---

## Implementation

**When to use:**
- Any approval awaited >48 hours
- Any decision with >2 stakeholders
- Any request with potential ambiguity

**Formula:**
1. State the decision needed: "I need your approval to proceed with Phase 2."
2. Provide explicit options:
   - ✅ Approval path: "Phase 1 is complete. Should I start Phase 2 now?"
   - ❌ Revision path: "Phase 1 needs feedback on X, Y, Z. Can we sync on Monday?"
3. Set deadline: "I'll assume approval by EOD Thursday unless I hear otherwise."

---

## Why This Works

**Cognitive economics:**
- Approval decision takes 30 seconds (binary choice)
- Revision decision takes 3–5 minutes (identify issues, suggest fixes)
- Either way: decision made in <10 minutes vs. >1 hour

**Escalation psychology:**
- Explicit options show respect for owner's time
- Binary choice = faster decision-making
- Clear next actions reduce ambiguity

---

**Date created:** March 5, 2026  
**Category:** Operational patterns & frameworks  
**Relevance:** Project management, approval workflows, team coordination  

---

## Problem Statement

Build speed and execution timelines often exceed decision speed. When projects ship features/deliverables faster than stakeholders can review them, projects block on approval—not capability.

### Example (March 4, 2026)
- Phase 1 marketing agents: Built + delivered (Feb 1–23)
- Expected feedback: EOD Monday, March 2
- Actual: 96+ hours overdue (escalation recommended)
- Impact: Phase 2 (7-10 day sprint) cannot start

---

## Root Cause Options

### 1. Queue Bottleneck (Most Common)
Stakeholder received but hasn't reviewed. Fix: Gentle reminder with 2-option frame. Timeline: 24-48h.

### 2. Scope Mismatch (Medium)
Deliverable doesn't match expectations. Fix: Clarifying call + revision options. Timeline: 1-3 days.

### 3. Strategic Pivot (Lower)
Project deprioritized due to new info. Fix: Ask directly about priority shift. Timeline: varies.

### 4. Implicit Approval (Unlikely)
Stakeholder satisfied but didn't formally close loop. Fix: Confirm in writing. Timeline: immediate.

---

## Decision Frame Pattern

Instead of open-ended feedback requests, structure as binary:

\`\`\`
Status: [Project] is complete and ready for [next stage].

Option 1: Approve → [next action] starts immediately
Option 2: Revisions needed on [X, Y, Z] → [revised timeline]

Decision needed by: [48-hour deadline]
\`\`\`

Benefits: Reduces cognitive load, shortens decision time, creates accountability, unblocks execution.

---

## Key Lessons

1. Delivery speed ≠ decision speed
2. Structure decisions as binary choices
3. Diagnose before escalating
4. Use soft deadlines
5. Explicit > implicit

---

    const contacts = [

    let selectedDoc = null;
    let selectedTag = null;
    let searchTerm = "";

    function getAllTags() {
      const tags = new Set();
      docs.forEach(d => d.tags.forEach(t => tags.add(t)));
      return Array.from(tags).sort();
    }

    function renderTags() {
      const container = document.getElementById("tags-container");
      const allTags = getAllTags();
      container.innerHTML = "<div class=\"tag-pill " + (selectedTag === null ? "active" : "") + "\" onclick=\"selectTag(null)\">All</div>";
      allTags.forEach(tag => {
        const active = selectedTag === tag ? "active" : "";
        container.innerHTML += `<div class="tag-pill ${active}" onclick="selectTag('${tag}')">${tag}</div>`;
      });
    }

    function renderSidebar() {
      const container = document.getElementById("sections-container");
      const journals = docs.filter(d => d.tags.includes("journal"));
      const concepts = docs.filter(d => !d.tags.includes("journal"));

      container.innerHTML = "";
      
      if (journals.length) {
        container.innerHTML += "<div class=\"sidebar-section\"><h3>Journal</h3><div class=\"doc-list\">";
        journals.forEach(doc => {
          const match = matchesFilters(doc);
          const visible = match ? "" : "hidden";
          const active = selectedDoc === doc.slug ? "active" : "";
          container.innerHTML += `
            <div class="doc-item ${active} ${visible}" data-slug="${doc.slug}" onclick="selectDoc('${doc.slug}')">
              <div class="doc-title">${doc.title}</div>
              <div class="doc-meta">${doc.date || 'Concept'}</div>
            </div>
          `;
        });
        container.innerHTML += "</div></div>";
      }

      if (concepts.length) {
        container.innerHTML += "<div class=\"sidebar-section\"><h3>Concepts</h3><div class=\"doc-list\">";
        concepts.forEach(doc => {
          const match = matchesFilters(doc);
          const visible = match ? "" : "hidden";
          const active = selectedDoc === doc.slug ? "active" : "";
          container.innerHTML += `
            <div class="doc-item ${active} ${visible}" data-slug="${doc.slug}" onclick="selectDoc('${doc.slug}')">
              <div class="doc-title">${doc.title}</div>
            </div>
          `;
        });
        container.innerHTML += "</div></div>";
      }
    }

    function matchesFilters(doc) {
      const matchesSearch = searchTerm === "" || doc.title.toLowerCase().includes(searchTerm.toLowerCase());
      const matchesTag = selectedTag === null || doc.tags.includes(selectedTag);
      return matchesSearch && matchesTag;
    }

    function selectDoc(slug) {
      selectedDoc = slug;
      const doc = docs.find(d => d.slug === slug);
      if (doc) renderDoc(doc);
      renderSidebar();
    }

    function selectTag(tag) {
      selectedTag = tag;
      renderTags();
      renderSidebar();
    }

    function renderDoc(doc) {
      const tagsHtml = doc.tags.map(t => `<span class="tag">${t}</span>`).join("");
      const main = document.getElementById("main");
      main.innerHTML = `
        <div class="doc-content">
          <div class="doc-header">
            <h1>${doc.title}</h1>
            <div class="doc-tags">${tagsHtml}</div>
          </div>
          <div class="doc-body">${renderMarkdown(doc.content)}</div>
        </div>
      `;
    }

    function renderMarkdown(text) {
      let html = text
        .replace(/^# (.*?)$/gm, '<h1>$1</h1>')
        .replace(/^## (.*?)$/gm, '<h2>$1</h2>')
        .replace(/^### (.*?)$/gm, '<h3>$1</h3>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/^- (.*?)$/gm, '<li>$1</li>')
        .replace(/(<li>.*?<\/li>)/s, '<ul>$1</ul>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/`(.*?)`/g, '<code>$1</code>')
        .replace(/^\n/gm, '');
      return '<p>' + html + '</p>';
    }

    function renderPeople() {
      const container = document.getElementById("people-container");
      const searchTerm = document.getElementById("people-search").value.toLowerCase();
      const filtered = contacts.filter(c => 
        c.name.toLowerCase().includes(searchTerm) || c.email.toLowerCase().includes(searchTerm)
      );
      
      container.innerHTML = "<div class=\"people-grid\">" + filtered.map(c => `
        <div class="person-card">
          <div class="person-name">${c.name}</div>
          ${c.relationship ? `<div class="person-role">${c.relationship}</div>` : ""}
          <div class="person-info">
            <div>📧 ${c.email}</div>
            ${c.notes ? `<div>📝 ${c.notes}</div>` : ""}
          </div>
        </div>
      `).join("") + "</div>";
    }

    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        
        const tabName = tab.dataset.tab;
        document.getElementById("docs-panel").classList.toggle("hidden", tabName !== "documents");
        document.getElementById("people-panel").classList.toggle("hidden", tabName !== "people");
        
        if (tabName === "people") renderPeople();
      });
    });

    document.getElementById("search").addEventListener("input", (e) => {
      searchTerm = e.target.value;
      renderSidebar();
    });

    document.getElementById("people-search").addEventListener("input", () => {
      renderPeople();
    });

    renderTags();
    renderSidebar();
    if (docs.length) selectDoc(docs[0].slug);
  </script>
